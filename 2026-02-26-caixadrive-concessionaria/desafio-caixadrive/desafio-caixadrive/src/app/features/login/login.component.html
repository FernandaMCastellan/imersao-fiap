<div class="pageLogin">

  <mat-card class="cardContainer">

    <mat-card-header class="titulo">
      <mat-card-title><strong>Caixa</strong> Drive</mat-card-title>
      <mat-card-subtitle style="margin-top: 20px; margin-bottom: 0px; font-size: 1.35rem;">Login</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>

      <form [formGroup]="formLogin" (ngSubmit)="login()" class="formLogin">

        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="senha">
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit">
          Entrar
        </button>

      </form>

    </mat-card-content>

  </mat-card>

</div>
